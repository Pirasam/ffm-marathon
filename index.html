<style>

  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;min-height:100vh;}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:20px 24px 16px;position:sticky;top:0;z-index:100;}
  .header-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;gap:12px;}
  .title{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--accent);letter-spacing:-0.5px;}
  .countdown{font-size:11px;color:var(--text-dim);letter-spacing:0.05em;text-align:right;}
  .countdown span{color:var(--accent);font-weight:500;}
  .week-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
  .week-tab{padding:5px 14px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;white-space:nowrap;transition:all 0.15s;letter-spacing:0.05em;}
  .week-tab:hover{border-color:var(--accent-dim);color:var(--text);}
  .week-tab.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:500;}
  .week-tab.current-week{border-color:var(--accent-dim);}
  .main{padding:20px 24px;max-width:720px;margin:0 auto;}
  .week-meta{display:flex;align-items:baseline;gap:12px;margin-bottom:8px;flex-wrap:wrap;}
  .week-name{font-family:'Fraunces',serif;font-size:18px;font-weight:300;font-style:italic;}
  .week-focus{font-size:11px;color:var(--text-dim);letter-spacing:0.04em;}
  .week-dates{font-size:10px;color:var(--text-dim);}
  .week-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px;}
  .stat{background:var(--surface);border:1px solid var(--border);padding:10px 12px;}
  .stat-label{font-size:10px;color:var(--text-dim);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;}
  .stat-val{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:var(--accent);}
  .days{display:flex;flex-direction:column;gap:1px;}
  .day-row{background:var(--surface);border:1px solid var(--border);padding:14px 16px;transition:border-color 0.15s;}
  .day-row.today{border-left:3px solid var(--accent);}
  .day-top{display:grid;grid-template-columns:110px 1fr auto;align-items:start;gap:12px;margin-bottom:8px;}
  .day-name{font-size:11px;color:var(--text-dim);letter-spacing:0.06em;text-transform:uppercase;padding-top:2px;}
  .day-name.today-label{color:var(--accent);}
  .day-title{font-family:'Fraunces',serif;font-size:15px;font-weight:300;line-height:1.3;}
  .badges{display:flex;gap:4px;flex-wrap:wrap;}
  .badge{font-size:9px;padding:2px 7px;letter-spacing:0.08em;text-transform:uppercase;font-weight:500;}
  .badge-run{background:#1a2a08;color:var(--run);border:1px solid #2d4a0f;}
  .badge-bike{background:#081a2a;color:var(--blue);border:1px solid #0f2d4a;}
  .badge-kraft{background:#2a1a08;color:var(--warn);border:1px solid #4a2d0f;}
  .badge-rest{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);}
  .badge-z2{background:#1a2a08;color:#8aaa1f;border:1px solid #1d2e0a;}
  .badge-lt{background:#2a1a08;color:var(--warn);border:1px solid #4a2d0f;}
  .day-desc{font-size:12px;color:var(--text-dim);line-height:1.6;padding-left:122px;}
  .day-status{display:flex;align-items:center;gap:6px;margin-top:10px;padding-left:122px;}
  .status-btn{font-family:'DM Mono',monospace;font-size:10px;padding:3px 10px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;letter-spacing:0.05em;transition:all 0.15s;}
  .status-btn:hover{border-color:var(--text-dim);color:var(--text);}
  .status-btn.done{background:#1a2a08;color:var(--run);border-color:#2d4a0f;}
  .status-btn.skip{background:#2a0808;color:var(--danger);border-color:#4a0f0f;}
  .status-btn.modified{background:#2a1a08;color:var(--warn);border-color:#4a2d0f;}
  .checkin-bar{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);padding:14px 16px;margin-bottom:20px;}
  .checkin-title{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
  .checkin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .checkin-item label{font-size:10px;color:var(--text-dim);letter-spacing:0.06em;display:block;margin-bottom:5px;text-transform:uppercase;}
  .slider-wrap{display:flex;align-items:center;gap:8px;}
  input[type=range]{-webkit-appearance:none;width:100%;height:2px;background:var(--border);outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--accent);cursor:pointer;}
  .slider-val{font-family:'Fraunces',serif;font-size:16px;font-weight:700;color:var(--accent);min-width:16px;text-align:right;}
  .adapt-banner{background:#1a1a08;border:1px solid #3a3a0f;padding:12px 16px;margin-bottom:16px;display:none;}
  .adapt-banner.visible{display:block;}
  .adapt-title{font-size:10px;color:var(--warn);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
  .adapt-text{font-size:12px;color:var(--text-dim);line-height:1.5;}
  .note-box{margin-top:20px;border-left:2px solid var(--border);padding-left:14px;font-size:12px;color:var(--text-dim);line-height:1.7;}
  .progress-section{margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
  .progress-title{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px;}
  .progress-bars{display:flex;flex-direction:column;gap:8px;}
  .prog-row{display:grid;grid-template-columns:80px 1fr 50px;align-items:center;gap:10px;}
  .prog-label{font-size:11px;color:var(--text-dim);}
  .prog-bar-bg{height:3px;background:var(--border);}
  .prog-bar-fill{height:100%;background:var(--accent);transition:width 0.5s;}
  .prog-val{font-size:11px;color:var(--text);text-align:right;}
  .garmin-bar{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--blue);padding:14px 16px;margin-bottom:12px;display:none;}
  .garmin-bar.loaded{display:block;}
  .garmin-title{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--blue);margin-bottom:12px;}
  .garmin-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:0;}
  .garmin-item .garmin-label{font-size:10px;color:var(--text-dim);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:4px;}
  .garmin-item .garmin-val{font-family:'Fraunces',serif;font-size:16px;font-weight:700;}
  .garmin-val.good{color:var(--run);}
  .garmin-val.ok{color:var(--warn);}
  .garmin-val.bad{color:var(--danger);}
  .garmin-val.neutral{color:var(--text);}
  .garmin-rec{font-size:12px;color:var(--text-dim);line-height:1.5;padding-top:10px;border-top:1px solid var(--border);margin-top:10px;}
  .garmin-updated{font-size:10px;color:var(--text-dim);margin-top:4px;opacity:0.5;}
  @media(max-width:600px){.week-stats{grid-template-columns:repeat(2,1fr);}.day-top{grid-template-columns:90px 1fr;}.day-top .badges{grid-column:1/-1;}.day-desc{padding-left:0;}.day-status{padding-left:0;}.checkin-grid{grid-template-columns:1fr;}.garmin-grid{grid-template-columns:repeat(2,1fr);}.main{padding:16px;}}
</style>

const weekStarts = ["2026-06-15", "2026-06-22", "2026-06-29", "2026-07-06", "2026-07-13", "2026-07-20", "2026-07-27", "2026-08-03", "2026-08-10", "2026-08-17", "2026-08-24", "2026-08-31", "2026-09-07", "2026-09-14", "2026-09-21", "2026-09-28", "2026-10-05", "2026-10-12", "2026-10-19"];
const MARATHON = new Date('2026-10-25');

let activeWeek = 0;
let dayStatus = JSON.parse(localStorage.getItem('dayStatus')||'{}');
let checkin = JSON.parse(localStorage.getItem('checkin')||'{"sleep":7.5,"wellbeing":3,"hrv":2}');
function saveState(){localStorage.setItem('dayStatus',JSON.stringify(dayStatus));localStorage.setItem('checkin',JSON.stringify(checkin));}

function daysUntilMarathon(){const t=new Date();t.setHours(0,0,0,0);return Math.ceil((MARATHON-t)/(864e5));}
function getCurrentWeek(){
  const t=new Date();t.setHours(0,0,0,0);
  let cur=0;
  for(let i=0;i<weekStarts.length;i++){const ws=new Date(weekStarts[i]);ws.setHours(0,0,0,0);if(t>=ws)cur=i;}
  return cur;
}
function isTodayRow(dayId,wIdx){
  if(wIdx!==getCurrentWeek())return false;
  const today=new Date().getDay();const map={mo:1,di:2,mi:3,do:4,fr:5,sa:6,so:0};
  const m=dayId.match(/(mo|di|mi|do|fr|sa|so)$/);if(!m)return false;return map[m[1]]===today;
}
function fmtDate(iso){const d=new Date(iso);return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});}
function weekRange(i){const a=new Date(weekStarts[i]);const b=new Date(a);b.setDate(b.getDate()+6);return fmtDate(weekStarts[i])+'–'+b.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});}
function badgeClass(b){return 'badge badge-'+b;}
function badgeLabel(b){return {run:'Laufen',bike:'Rad',kraft:'Kraft',rest:'Pause',z2:'Zone 2',lt:'Tempo/LT'}[b]||b;}

function getAdaptation(){
  const s=parseFloat(document.getElementById('sleep').value);
  const w=parseInt(document.getElementById('wellbeing').value);
  const h=parseInt(document.getElementById('hrv').value);
  const m=[];
  if(s<6)m.push("Schlaf <6h: Heute keinen Longrun – max. 10 km Zone 1. Kein Tempolauf.");
  else if(s<7)m.push("Schlaf <7h: Longrun-Pace um 15–20 sek/km reduzieren.");
  if(w<=2)m.push("Wohlbefinden niedrig: Intensität streichen, nur Zone 1–2. Bei Schmerzen Ruhetag.");
  else if(w===3)m.push("Wohlbefinden ok: Plan wie vorgesehen, Puls im Auge behalten.");
  if(h===1)m.push("HFV rot: Kein Tempolauf. Longrun um 3–5 km kürzen.");
  else if(h===2)m.push("HFV ok: Plan wie vorgesehen.");
  else m.push("HFV grün: Alles gut – Plan vollständig durchführen.");
  return m;
}

function renderTabs(){
  const cur=getCurrentWeek();
  document.getElementById('tabs').innerHTML=weeks.map((w,i)=>
    `<button class="week-tab ${i===activeWeek?'active':''} ${i===cur?'current-week':''}" onclick="selectWeek(${i})">${w.label}${i===cur?' ●':''}</button>`).join('');
}
function renderWeek(){
  const w=weeks[activeWeek];
  const stats=w.stats.map(s=>`<div class="stat"><div class="stat-label">${s.l}</div><div class="stat-val">${s.v}</div></div>`).join('');
  const days=w.days.map(d=>{
    const st=dayStatus[d.id]||'none';
    const isToday=isTodayRow(d.id,activeWeek);
    const badges=d.badges.map(b=>`<span class="${badgeClass(b)}">${badgeLabel(b)}</span>`).join('');
    return `<div class="day-row${isToday?' today':''}" id="row-${d.id}">
      <div class="day-top">
        <div class="day-name${isToday?' today-label':''}">${d.name}${isToday?' · heute':''}</div>
        <div class="day-title">${d.title}</div>
        <div class="badges">${badges}</div>
      </div>
      <div class="day-desc">${d.desc}</div>
      <div class="day-status">
        <button class="status-btn ${st==='done'?'done':''}" onclick="setStatus('${d.id}','done',event)">✓ done</button>
        <button class="status-btn ${st==='skip'?'skip':''}" onclick="setStatus('${d.id}','skip',event)">✗ skip</button>
        <button class="status-btn ${st==='modified'?'modified':''}" onclick="setStatus('${d.id}','modified',event)">≈ angepasst</button>
      </div></div>`;
  }).join('');
  const done=w.days.filter(d=>dayStatus[d.id]==='done').length;
  document.getElementById('week-content').innerHTML=`
    <div class="week-meta"><span class="week-name">${w.name}</span><span class="week-focus">${w.focus}</span><span class="week-dates">${weekRange(activeWeek)}</span></div>
    <div class="week-stats">${stats}</div>
    <div class="days">${days}</div>
    <div class="note-box">${w.note}</div>
    <div class="progress-section"><div class="progress-title">Wochenfortschritt</div>
    <div class="progress-bars"><div class="prog-row"><span class="prog-label">Einheiten</span>
    <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${Math.round(done/w.days.length*100)}%"></div></div>
    <span class="prog-val">${done}/${w.days.length}</span></div></div></div>`;
}
function renderAdaptation(){
  const banner=document.getElementById('adapt-banner');
  const s=parseFloat(document.getElementById('sleep').value);
  const w=parseInt(document.getElementById('wellbeing').value);
  const h=parseInt(document.getElementById('hrv').value);
  banner.className='adapt-banner '+((s<7||w<=2||h===1)?'visible':'');
  document.getElementById('adapt-text').innerHTML=getAdaptation().join('<br>');
}
window.selectWeek=function(i){activeWeek=i;renderTabs();renderWeek();};
window.setStatus=function(id,status,e){e.stopPropagation();dayStatus[id]=dayStatus[id]===status?'none':status;saveState();renderWeek();};
function updateCheckin(){
  const s=document.getElementById('sleep').value,w=document.getElementById('wellbeing').value,h=document.getElementById('hrv').value;
  document.getElementById('sleep-val').textContent=s;document.getElementById('wellbeing-val').textContent=w;
  document.getElementById('hrv-val').textContent={1:'Rot',2:'Ok',3:'Grün'}[h];
  checkin={sleep:parseFloat(s),wellbeing:parseInt(w),hrv:parseInt(h)};saveState();renderAdaptation();
}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('days-left').textContent=daysUntilMarathon();
  const cur=getCurrentWeek();
  document.getElementById('phase-label').textContent='Aktuell: '+weeks[cur].label+' · '+weeks[cur].name;
  activeWeek=cur;
  document.getElementById('sleep').value=checkin.sleep;
  document.getElementById('wellbeing').value=checkin.wellbeing;
  document.getElementById('hrv').value=checkin.hrv;
  updateCheckin();renderTabs();renderWeek();

  // Garmin-Daten einlesen (täglich per GitHub Action injiziert)
  if(window.GARMIN_DATA){
    const g=window.GARMIN_DATA;
    const today=new Date().toISOString().split('T')[0];
    const bar=document.getElementById('garmin-bar');
    bar.classList.add('loaded');

    const cls=(v,good,ok)=>v==null?'neutral':v>=good?'good':v>=ok?'ok':'bad';

    const sleepEl=document.getElementById('g-sleep');
    if(g.sleep_hours!=null){sleepEl.textContent=g.sleep_hours+'h';sleepEl.className='garmin-val '+cls(g.sleep_hours,7,6);}

    const hrvEl=document.getElementById('g-hrv');
    const hrvMap={BALANCED:['Grün','good'],UNBALANCED:['Gelb','ok'],LOW:['Rot','bad'],POOR:['Rot','bad'],NONE:['–','neutral']};
    if(g.hrv_status&&hrvMap[g.hrv_status]){
      const[lbl,c]=hrvMap[g.hrv_status];
      hrvEl.textContent=lbl+(g.hrv_value?' · '+g.hrv_value+' ms':'');
      hrvEl.className='garmin-val '+c;
    }

    const bbEl=document.getElementById('g-bb');
    if(g.body_battery!=null){bbEl.textContent=g.body_battery;bbEl.className='garmin-val '+cls(g.body_battery,70,40);}

    const readyEl=document.getElementById('g-ready');
    if(g.training_readiness!=null){readyEl.textContent=g.training_readiness;readyEl.className='garmin-val '+cls(g.training_readiness,70,40);}

    if(g.recommendation)document.getElementById('garmin-rec').textContent=g.recommendation;
    if(g.updated)document.getElementById('garmin-updated').textContent='Stand: '+g.updated;

    // Slider einmalig pro Tag auto-setzen (nur wenn Daten von heute)
    if(g.updated===today&&localStorage.getItem('garminAutoSet')!==today){
      document.getElementById('sleep').value=g.slider_sleep;
      document.getElementById('wellbeing').value=g.slider_wellbeing;
      document.getElementById('hrv').value=g.slider_hrv;
      checkin={sleep:g.slider_sleep,wellbeing:g.slider_wellbeing,hrv:g.slider_hrv};
      saveState();updateCheckin();
      localStorage.setItem('garminAutoSet',today);
    }
  }
});
</script>
</body>
</html>
