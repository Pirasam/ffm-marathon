name: Dashboard rendern

# Architektur:
#   Garmin-Abruf laeuft LOKAL auf dem Mac (sync_garmin.py via launchd) und pusht
#   garmin_data.json. Grund: Garmin blockt den OAuth-Refresh aus GitHub-IPs (429).
#   Dieser Workflow rendert daraus nur das Dashboard (braucht nur den Claude-Key).
#
#   Haupt-Ausloeser ist deshalb der PUSH der Daten – nicht der unzuverlaessige
#   GitHub-Scheduler. Der Zeitplan bleibt nur als Sicherheitsnetz.

on:
  push:
    paths:
      - "garmin_data.json"      # laeuft direkt nach dem lokalen Sync
      - "update_plan.py"
      - ".github/workflows/update-plan.yml"
    branches: [main]
  schedule:
    - cron: "30 5 * * *"        # Sicherheitsnetz ~07:30 MESZ
    - cron: "0 7 * * *"         # Sicherheitsnetz ~09:00 MESZ
  workflow_dispatch:

concurrency:
  group: dashboard-render
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Daten pruefen (Frische + Vollstaendigkeit)
        id: check
        run: |
          if [ ! -f garmin_data.json ]; then
            echo "garmin_data.json fehlt – nichts zu rendern."
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          SYNC=$(python3 -c "import json;print(json.load(open('garmin_data.json')).get('sync_date',''))")
          AGE=$(( ( $(date -u +%s) - $(date -u -d "$SYNC" +%s) ) / 86400 ))
          echo "Datenstand: $SYNC (Alter: $AGE Tage)"
          # Bei geplanten Laeufen nicht doppelt rendern, wenn index.html schon aktuell ist
          if [ "${{ github.event_name }}" = "schedule" ] && \
             grep -q "\"updated\": \"$(date -u +%Y-%m-%d)\"" index.html; then
            echo "Heute bereits gerendert – ueberspringe."
            echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        if: steps.check.outputs.skip == 'false'
        with:
          python-version: "3.11"

      - name: Abhaengigkeiten installieren
        if: steps.check.outputs.skip == 'false'
        run: pip install -r requirements.txt

      - name: Dashboard rendern
        if: steps.check.outputs.skip == 'false'
        run: python update_plan.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Aenderungen pushen
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "Marathon Bot"
          git config user.email "marathon-bot@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "index.html unveraendert – nichts zu pushen."
            exit 0
          fi
          git commit -m "Dashboard: $(date +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase --quiet origin main && git push --quiet && exit 0
            echo "Push-Versuch $i fehlgeschlagen, neuer Versuch …"; sleep 10
          done
          exit 1
