name: Tägliches Trainingsupdate

on:
  schedule:
    # Mehrere Auslösezeiten als Fallback gegen GitHubs unzuverlässige Scheduler.
    # Ziel ist ~07:00 MESZ; der Idempotenz-Schutz sorgt dafür, dass pro Tag nur
    # der erste erfolgreiche Lauf wirklich arbeitet (die anderen brechen früh ab).
    - cron: "0 5 * * *"    # 07:00 MESZ
    - cron: "20 5 * * *"   # 07:20
    - cron: "45 5 * * *"   # 07:45
    - cron: "15 6 * * *"   # 08:15
    - cron: "0 7 * * *"    # 09:00 (Sicherheitsnetz)
  workflow_dispatch:        # manuell auslösbar

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Schon heute aktualisiert? (Idempotenz)
        id: guard
        run: |
          if grep -q "\"updated\": \"$(date -u +%Y-%m-%d)\"" index.html; then
            echo "Heute bereits aktualisiert – überspringe."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.skip == 'false'
        with:
          python-version: "3.11"

      - name: Garmin-Session cachen
        if: steps.guard.outputs.skip == 'false'
        uses: actions/cache@v4
        with:
          path: ~/.garmin_session
          key: garmin-session-${{ github.run_number }}
          restore-keys: |
            garmin-session-

      - name: Abhängigkeiten installieren
        if: steps.guard.outputs.skip == 'false'
        run: pip install -r requirements.txt

      - name: Plan aktualisieren
        if: steps.guard.outputs.skip == 'false'
        run: python update_plan.py
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GARMIN_SESSION_DATA: ${{ secrets.GARMIN_SESSION_DATA }}

      - name: Änderungen pushen
        if: steps.guard.outputs.skip == 'false'
        run: |
          git config user.name "Marathon Bot"
          git config user.email "marathon-bot@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || (
            git commit -m "Tagesupdate: $(date +%Y-%m-%d)" &&
            git pull --rebase origin main &&
            git push
          )
