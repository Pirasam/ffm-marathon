name: Garmin-Erreichbarkeit testen

# Diagnose: Kann GitHub Actions sich bei Garmin anmelden? Schreibt das Ergebnis
# nach diag_garmin.txt und committet es, damit es ohne Log-Zugriff lesbar ist.

on:
  workflow_dispatch:
  push:
    paths: [".github/workflows/garmin-test.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Login-Versuche mit Backoff
        env:
          GARMIN_SESSION_DATA: ${{ secrets.GARMIN_SESSION_DATA }}
        run: |
          python - <<'PY'
          import os, time, datetime
          from garminconnect import Garmin

          out = []
          def log(s):
              print(s); out.append(s)

          secret = os.environ.get("GARMIN_SESSION_DATA", "").strip()
          log(f"Zeit: {datetime.datetime.utcnow().isoformat()}Z")
          log(f"Secret vorhanden: {bool(secret)}, Laenge: {len(secret)}")

          result = "SECRET_FEHLT"
          if secret:
              for i, d in enumerate([0, 30, 90, 180], 1):
                  if d:
                      log(f"warte {d}s …"); time.sleep(d)
                  try:
                      api = Garmin()
                      api.garth.loads(secret)
                      api.display_name = api.garth.profile.get("displayName")
                      rhr = api.get_stats(datetime.date.today().isoformat()).get("restingHeartRate")
                      log(f"Versuch {i}: ERFOLG – Nutzer {api.display_name}, Ruhepuls {rhr}")
                      result = "ACTIONS_KANN_GARMIN"
                      break
                  except Exception as e:
                      msg = str(e)[:180]
                      log(f"Versuch {i}: Fehler – {msg}")
                      result = "BLOCKIERT_429" if "429" in msg else (
                               "TOKEN_UNGUELTIG_401" if "401" in msg else "FEHLER_ANDERE")

          log(f"ERGEBNIS: {result}")
          with open("diag_garmin.txt", "w") as f:
              f.write("\n".join(out) + "\n")
          PY

      - name: Ergebnis committen
        run: |
          git config user.name "Diag Bot"
          git config user.email "diag@users.noreply.github.com"
          git add diag_garmin.txt
          git diff --staged --quiet || {
            git commit -m "Diagnose Garmin-Erreichbarkeit"
            git pull --rebase --autostash --quiet origin main
            git push --quiet
          }
