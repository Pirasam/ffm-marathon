name: Garmin-Erreichbarkeit testen

# Einmaliger Diagnose-Workflow: Kann GitHub Actions sich ueberhaupt bei Garmin
# anmelden? Schreibt nichts, aendert nichts – reiner Test mit Wiederholungen,
# um transiente 429 von einer echten Sperre zu unterscheiden.

on:
  workflow_dispatch:
  push:
    paths: [".github/workflows/garmin-test.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Login-Versuche mit Backoff
        env:
          GARMIN_SESSION_DATA: ${{ secrets.GARMIN_SESSION_DATA }}
        run: |
          python - <<'PY'
          import os, time, sys
          from garminconnect import Garmin

          secret = os.environ.get("GARMIN_SESSION_DATA", "").strip()
          print(f"Secret vorhanden: {bool(secret)}, Laenge: {len(secret)}")
          if not secret:
              print("ERGEBNIS: SECRET_FEHLT"); sys.exit(0)

          delays = [0, 30, 90, 180]
          for i, d in enumerate(delays, 1):
              if d:
                  print(f"warte {d}s …"); time.sleep(d)
              try:
                  api = Garmin()
                  api.garth.loads(secret)
                  name = api.garth.profile.get("displayName")
                  api.display_name = name
                  rhr = api.get_stats("2026-07-20").get("restingHeartRate")
                  print(f"Versuch {i}: ERFOLG – Nutzer {name}, Ruhepuls {rhr}")
                  print("ERGEBNIS: ACTIONS_KANN_GARMIN")
                  sys.exit(0)
              except Exception as e:
                  msg = str(e)[:200]
                  print(f"Versuch {i}: Fehler – {msg}")
                  code = "429" if "429" in msg else ("401" if "401" in msg else "andere")
                  last = code
          print(f"ERGEBNIS: ACTIONS_BLOCKIERT ({last})")
          PY
